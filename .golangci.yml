# golangci-lint configuration for OpenPass
# https://golangci-lint.run/usage/configuration/
#
# NOTE: gosec is deliberately run as a standalone CI step (not via golangci-lint)
# to produce dedicated SARIF output for the GitHub Security tab. Consolidating it
# here would lose that security reporting integration.

version: "2"

run:
  timeout: 5m
  modules-download-mode: readonly
  go: "1.26"


linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - bodyclose
    - dogsled
    - dupl
    - errorlint
    - exhaustive
    - copyloopvar
    - misspell
    - nakedret
    - prealloc
    - revive
    - unconvert
    - unparam
    - whitespace
    - gocyclo
    - gocritic
    - goconst
    - errchkjson

  settings:
    errcheck:
      check-type-assertions: true
    govet:
      enable-all: true
      disable:
        - fieldalignment
    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: increment-decrement
        - name: var-naming
        - name: var-declaration
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: indent-error-flow
        - name: errorf
    staticcheck:
      checks:
        - "all"
        - "-ST1000"
        - "-ST1003"
        - "-SA4006"
    dupl:
      threshold: 150
    gocyclo:
      min-complexity: 30
    misspell:
      locale: US
    nakedret:
      max-func-lines: 60
    prealloc:
      simple: false
      range-loops: false
      for-loops: true
    exhaustive:
      default-signifies-exhaustive: true

  exclusions:
    rules:
      - path: '(.+)_test\.go'
        linters:
          - errcheck
          - errorlint
          - unused
          - govet
          - staticcheck
          - errchkjson
          - goconst
          - gocritic
          - gocyclo
      # Config value strings — constants would not improve readability
      - path: 'internal/config/config\.go'
        linters:
          - goconst
      # JSON-RPC protocol version string used throughout the MCP package
      - path: 'internal/mcp/.+\.go'
        linters:
          - goconst
      # Output format literals and OS names — constants would not improve readability
      - path: 'cmd/.+\.go'
        linters:
          - goconst
      - path: 'internal/daemon/.+\.go'
        linters:
          - goconst
      # Loop variables are fine as short names in tight loops
      - path: '(.+)_test\.go'
        linters:
          - gocritic

      # Vendored third-party Go code under editors/node_modules
      - path: 'editors/node_modules/flatted/.+'
        linters:
          - gocyclo
          - prealloc
          - revive

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - github.com/danieljustus/OpenPass

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
