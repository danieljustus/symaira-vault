name: Feature request
description: Suggest an improvement or new capability for Symaira Vault.
title: "feat: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe the workflow this would improve.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the behavior or command shape you want.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Mention existing workarounds or different designs.
  - type: dropdown
    id: contribution
    attributes:
      label: Contribution
      options:
        - I can open a pull request for this
        - I can help test this
        - I am only requesting the feature
    validations:
      required: true
