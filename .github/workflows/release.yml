name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  security-events: write
  id-token: write      # Required for Cosign keyless signing and SLSA attestation
  attestations: write  # Required for build provenance attestation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOSEC_VERSION: v2.22.0

jobs:
  lint:
    name: Lint & Security Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.11.4
          install-mode: binary
          args: --timeout=5m --verbose

      - name: Run gosec SAST scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          gosec -exclude-generated -exclude-dir=testdata -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 7

      - name: Upload gosec results to code scanning
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: gosec.sarif

  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run tests
        run: go test -v -race -timeout=30m ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: '1.26.4'
          go-package: ./...

  docker:
    name: Docker
    runs-on: ubuntu-latest
    needs: [test, govulncheck, lint]
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8 # v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6
        with:
          images: ghcr.io/danieljustus/symvault
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-name: ghcr.io/danieljustus/symvault
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  release:
    name: Release
    runs-on: macos-15
    needs: [test, govulncheck, lint]
    environment: release
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Import signing certificate
        id: signing
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "${CERTIFICATE_P12:-}" ]; then
            echo "::warning::CERTIFICATE_P12 secret is not set. Building unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "signed=true" >> "$GITHUB_OUTPUT"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.4.3'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}

      - name: Notarize macOS binaries
        if: steps.signing.outputs.signed == 'true'
        env:
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
        run: |
          if [ -z "${NOTARY_API_KEY:-}" ]; then
            echo "::warning::NOTARY_API_KEY secret is not set. Skipping notarization."
            exit 0
          fi
          for ARCH in amd64 arm64; do
            for f in dist/*_darwin_${ARCH}/*; do
              if [ -f "$f" ] && file "$f" | grep -q "Mach-O"; then
                echo "Notarizing $f..."
                ZIP_PATH="$RUNNER_TEMP/notarize_${ARCH}.zip"
                ditto -c -k --keepParent "$f" "$ZIP_PATH"
                xcrun notarytool submit "$ZIP_PATH" \
                  --apple-id "${NOTARY_API_KEY_ID}" \
                  --team-id "${NOTARY_API_ISSUER}" \
                  --password "${NOTARY_API_KEY}" \
                  --wait
                rm -f "$ZIP_PATH"
              fi
            done
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: 'dist/**'

      - name: Upload MCPB bundles to release
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release upload "$TAG" dist/*.mcpb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up signing material
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi

  smoke-test-mcpb:
    name: Smoke Test (MCPB Bundle)
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download MCPB bundle
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${TAG}/symvault_${VERSION}_linux_amd64.mcpb"

      - name: Verify MCPB structure
        run: |
          unzip -q symvault_*.mcpb -d mcpb-test
          test -f mcpb-test/manifest.json
          test -f mcpb-test/server/symvault
          test -x mcpb-test/server/symvault

      - name: Verify manifest.json
        run: |
          python3 <<'EOF'
          import json
          with open('mcpb-test/manifest.json') as f:
              m = json.load(f)
          assert m['manifest_version'] == '0.3'
          assert m['name'] == 'symvault'
          assert m['server']['type'] == 'binary'
          assert m['server']['entry_point'] == 'server/symvault'
          assert m['server']['mcp_config']['args'] == ['serve', '--stdio']
          print('manifest.json validated')
          EOF

      - name: Verify binary works
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          ./mcpb-test/server/symvault version | grep -q "$VERSION"

  smoke-test-linux:
    name: Smoke Test (Linux amd64)
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download Linux archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${TAG}/symaira-vault_${VERSION}_linux_amd64.tar.gz"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${TAG}/symaira-vault_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sha256sum -c "symaira-vault_${VERSION}_checksums.txt" --ignore-missing

      - name: Extract and install
        run: |
          tar xzf symaira-vault_*.tar.gz
          sudo mv ./*/symvault /usr/local/bin/symvault
          symvault version

      - name: Smoke test - help output
        run: symvault --help | head -5

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          SYMVAULT_PASSPHRASE="test-passphrase-123" SYMVAULT_VAULT="$TMPDIR/test-vault" symvault init
          rm -rf "$TMPDIR"

  smoke-test-deb:
    name: Smoke Test (deb package)
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download deb package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${TAG}/symvault_${VERSION}_linux_amd64.deb"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${TAG}/symaira-vault_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sha256sum -c "symaira-vault_${VERSION}_checksums.txt" --ignore-missing

      - name: Install deb package
        run: sudo dpkg -i symvault_*.deb

      - name: Verify package installed
        run: 'dpkg -s symvault | grep "Status: install ok installed"'

      - name: Smoke test - version
        run: symvault version

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          SYMVAULT_PASSPHRASE="test-passphrase-123" SYMVAULT_VAULT="$TMPDIR/test-vault" symvault init
          rm -rf "$TMPDIR"

  smoke-test-macos:
    name: Smoke Test (macOS amd64)
    runs-on: macos-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download macOS archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${TAG}/symaira-vault_${VERSION}_darwin_amd64.tar.gz"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${TAG}/symaira-vault_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          shasum -a 256 -c "symaira-vault_${VERSION}_checksums.txt" --ignore-missing

      - name: Extract and install
        run: |
          tar xzf symaira-vault_*.tar.gz
          sudo mv ./*/symvault /usr/local/bin/symvault
          symvault version

      - name: Smoke test - help output
        run: symvault --help | head -5

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          SYMVAULT_PASSPHRASE="test-passphrase-123" SYMVAULT_VAULT="$TMPDIR/test-vault" symvault init
          rm -rf "$TMPDIR"

  smoke-test-windows:
    name: Smoke Test (Windows amd64)
    runs-on: windows-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download Windows archive
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${tag}/symaira-vault_${version}_windows_amd64.zip"
          curl -fLO "https://github.com/danieljustus/symaira-vault/releases/download/${tag}/symaira-vault_${version}_checksums.txt"

      - name: Verify checksum
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          $expectedHash = (Get-Content "symaira-vault_${version}_checksums.txt" | Where-Object { $_ -match "windows_amd64\.zip$" } | ForEach-Object { ($_ -split '\s+')[0] })
          $actualHash = (Get-FileHash -Path "symaira-vault_${version}_windows_amd64.zip" -Algorithm SHA256).Hash.ToLower()
          if ($expectedHash.ToLower() -ne $actualHash) {
            Write-Error "Checksum mismatch: expected $expectedHash, got $actualHash"
            exit 1
          }

      - name: Extract and run smoke test
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          Expand-Archive -Path "symaira-vault_${version}_windows_amd64.zip" -DestinationPath .\symvault-tmp -Force
          $exe = Get-ChildItem -Path .\symvault-tmp -Recurse -Filter "symvault.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) {
            Write-Error "symvault.exe not found after extraction"
            Get-ChildItem -Path .\symvault-tmp -Recurse | Format-Table FullName
            exit 1
          }
          Write-Host "Found exe at: $exe"
          & $exe version

      - name: Smoke test - init vault
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          $tmpdir = Join-Path $env:TEMP "test-vault-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmpdir | Out-Null
          $exe = Get-ChildItem -Path .\symvault-tmp -Recurse -Filter "symvault.exe" | Select-Object -First 1 -ExpandProperty FullName
          if (-not $exe) {
            Write-Error "symvault.exe not found after extraction"
            exit 1
          }
          $env:SYMVAULT_PASSPHRASE = "test-passphrase-123"
          & $exe init --vault "$tmpdir"
          Remove-Item Env:SYMVAULT_PASSPHRASE
          Remove-Item -Path $tmpdir -Recurse -Force -ErrorAction SilentlyContinue

  smoke-test-homebrew:
    name: Smoke Test (Homebrew tap)
    runs-on: macos-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Fetch Homebrew formula
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          curl -fsSL "https://raw.githubusercontent.com/danieljustus/homebrew-tap/main/Formula/symvault.rb" -o symvault.rb

      - name: Verify formula exists and has correct version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          if [ ! -s symvault.rb ]; then
            echo "Homebrew formula not found or empty"
            exit 1
          fi
          if ! grep -q "version \"${VERSION}\"" symvault.rb; then
            echo "Version mismatch: expected ${VERSION} in formula"
            exit 1
          fi

      - name: Validate formula syntax
        run: |
          ruby -c symvault.rb

      - name: Smoke test - formula audit
        run: |
          brew tap danieljustus/tap
          # Audit the formula; allow failure if tap is not fully set up
          brew audit --strict --formula symvault.rb || true
