name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  security-events: write
  id-token: write      # Required for Cosign keyless signing and SLSA attestation
  attestations: write  # Required for build provenance attestation

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOSEC_VERSION: v2.22.0

jobs:
  lint:
    name: Lint & Security Gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-mode: binary
          args: --timeout=5m --verbose

      - name: Run gosec SAST scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          gosec -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 7

      - name: Upload gosec results to code scanning
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif

  test:
    name: Pre-release Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Run tests
        run: go test -v -race -timeout=30m ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26.3'
          go-package: ./...

  release:
    name: Release
    runs-on: macos-latest
    needs: [test, govulncheck, lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@v3

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@v0

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_BUCKET_GITHUB_TOKEN: ${{ secrets.SCOOP_BUCKET_GITHUB_TOKEN }}

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'dist/**'

  smoke-test-linux:
    name: Smoke Test (Linux amd64)
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download Linux archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/OpenPass_${VERSION}_linux_amd64.tar.gz"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/OpenPass_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sha256sum -c "OpenPass_${VERSION}_checksums.txt" --ignore-missing

      - name: Extract and install
        run: |
          tar xzf OpenPass_*.tar.gz
          sudo mv ./*/openpass /usr/local/bin/openpass
          openpass version

      - name: Smoke test - help output
        run: openpass --help | head -5

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          printf '%s\n' "test-passphrase-123" | OPENPASS_VAULT="$TMPDIR/test-vault" openpass init
          rm -rf "$TMPDIR"

  smoke-test-deb:
    name: Smoke Test (deb package)
    runs-on: ubuntu-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download deb package
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/openpass_${VERSION}_linux_amd64.deb"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/OpenPass_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          sha256sum -c "OpenPass_${VERSION}_checksums.txt" --ignore-missing

      - name: Install deb package
        run: sudo dpkg -i openpass_*.deb

      - name: Verify package installed
        run: 'dpkg -s openpass | grep "Status: install ok installed"'

      - name: Smoke test - version
        run: openpass version

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          printf '%s\n' "test-passphrase-123" | OPENPASS_VAULT="$TMPDIR/test-vault" openpass init
          rm -rf "$TMPDIR"

  smoke-test-macos:
    name: Smoke Test (macOS amd64)
    runs-on: macos-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download macOS archive
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/OpenPass_${VERSION}_darwin_amd64.tar.gz"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${TAG}/OpenPass_${VERSION}_checksums.txt"

      - name: Verify checksum
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          shasum -a 256 -c "OpenPass_${VERSION}_checksums.txt" --ignore-missing

      - name: Extract and install
        run: |
          tar xzf OpenPass_*.tar.gz
          sudo mv ./*/openpass /usr/local/bin/openpass
          openpass version

      - name: Smoke test - help output
        run: openpass --help | head -5

      - name: Smoke test - init vault
        run: |
          TMPDIR=$(mktemp -d)
          printf '%s\n' "test-passphrase-123" | OPENPASS_VAULT="$TMPDIR/test-vault" openpass init
          rm -rf "$TMPDIR"

  smoke-test-windows:
    name: Smoke Test (Windows amd64)
    runs-on: windows-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        shell: bash
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Download Windows archive
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${tag}/OpenPass_${version}_windows_amd64.zip"
          curl -fLO "https://github.com/danieljustus/OpenPass/releases/download/${tag}/OpenPass_${version}_checksums.txt"

      - name: Verify checksum
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          $expectedHash = (Get-Content "OpenPass_${version}_checksums.txt" | Where-Object { $_ -match "windows_amd64\.zip" } | ForEach-Object { ($_ -split '\s+')[0] })
          $actualHash = (Get-FileHash -Path "OpenPass_${version}_windows_amd64.zip" -Algorithm SHA256).Hash.ToLower()
          if ($expectedHash.ToLower() -ne $actualHash) {
            Write-Error "Checksum mismatch: expected $expectedHash, got $actualHash"
            exit 1
          }

      - name: Extract and run smoke test
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          Expand-Archive -Path "OpenPass_${version}_windows_amd64.zip" -DestinationPath .\openpass-tmp -Force
          .\openpass-tmp\openpass_${version}_windows_amd64\openpass.exe version

      - name: Smoke test - init vault
        shell: pwsh
        run: |
          $tag = "${{ steps.tag.outputs.tag }}"
          $version = $tag -replace '^v',''
          $tmpdir = Join-Path $env:TEMP "test-vault-$(Get-Random)"
          New-Item -ItemType Directory -Path $tmpdir | Out-Null
          $exe = ".\openpass-tmp\openpass_${version}_windows_amd64\openpass.exe"
          "test-passphrase-123" | & $exe init --vault "$tmpdir"
          Remove-Item -Path $tmpdir -Recurse -Force -ErrorAction SilentlyContinue

  smoke-test-homebrew:
    name: Smoke Test (Homebrew tap)
    runs-on: macos-latest
    needs: [release]
    steps:
      - name: Get release tag
        id: tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Fetch Homebrew formula
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          curl -fsSL "https://raw.githubusercontent.com/danieljustus/homebrew-tap/main/Formula/openpass.rb" -o openpass.rb

      - name: Verify formula exists and has correct version
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${TAG#v}"
          if [ ! -s openpass.rb ]; then
            echo "Homebrew formula not found or empty"
            exit 1
          fi
          if ! grep -q "version \"${VERSION}\"" openpass.rb; then
            echo "Version mismatch: expected ${VERSION} in formula"
            exit 1
          fi

      - name: Validate formula syntax
        run: |
          ruby -c openpass.rb

      - name: Smoke test - formula audit
        run: |
          brew tap danieljustus/tap
          # Audit the formula; allow failure if tap is not fully set up
          brew audit --strict --formula openpass.rb || true
