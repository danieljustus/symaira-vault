name: CI

on:
  push:
    branches: [ main ]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOSEC_VERSION: v2.22.0

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@v1
        with:
          go-version-input: '1.26.3'
          go-package: ./...
        continue-on-error: true

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.3.5
        with:
          scan-args: >-
            --lockfile=go.mod
            --format=sarif
            --output=osv-results.sarif
        continue-on-error: true

      - name: Upload OSV SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: osv-results.sarif

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Check formatting
        run: make fmt-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          install-mode: binary
          args: --timeout=5m --verbose

      - name: Run gosec SAST scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          gosec -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 7

      - name: Upload gosec results to code scanning
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: gosec.sarif

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26.3']
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          go mod download

      - name: Run tests
        shell: bash
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            go test -v -race -timeout=30m -coverprofile=coverage.out -skip 'TestFlow|TestBinaryE2E|Integration' ./...
          else
            go test -v -timeout=30m -skip 'TestFlow|TestBinaryE2E|Integration' ./...
          fi


      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: |
          COVERAGE_THRESHOLD=70
          echo "Checking coverage threshold: ${COVERAGE_THRESHOLD}%"
          TOTAL_LINE=$(go tool cover -func=coverage.out | grep "total:")
          echo "Coverage line: $TOTAL_LINE"
          COVERAGE=$(echo "$TOTAL_LINE" | grep -oE '[0-9]+\.[0-9]+' | tail -1)
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < $COVERAGE_THRESHOLD)}"; then
            echo "FAIL: Coverage ${COVERAGE}% is below threshold of ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "PASS: Coverage ${COVERAGE}% meets threshold of ${COVERAGE_THRESHOLD}%"

      - name: Run smoke tests
        shell: bash
        run: go test -v -timeout=15m -tags smoke -run TestBetaSmoke .

      - name: Run fuzz tests
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: |
          echo "Running fuzz tests with 60s per target..."
          go test -fuzz=FuzzCSVImporterParse -fuzztime=60s -timeout=120s ./internal/importer/
          go test -fuzz=FuzzBitwardenImporterParse -fuzztime=60s -timeout=120s ./internal/importer/
          go test -fuzz=FuzzOnePUXImporterParse -fuzztime=60s -timeout=120s ./internal/importer/
          go test -fuzz=FuzzParsePassEntry -fuzztime=60s -timeout=120s ./internal/importer/
          go test -fuzz=FuzzNormalizePath -fuzztime=60s -timeout=120s ./internal/importer/
          go test -fuzz=FuzzParseMapping -fuzztime=60s -timeout=120s ./internal/importer/
          echo "All fuzz tests passed without crashes"

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 7

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            extension: .exe
          - goos: windows
            goarch: arm64
            extension: .exe
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-${{ matrix.goos }}-${{ matrix.goarch }}-go-

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output_name="openpass-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}"
          go build -ldflags="-s -w -X main.version=dev -X main.commit=${{ github.sha }}" -o "$output_name" .
          echo "Built: $output_name"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: openpass-${{ matrix.goos }}-${{ matrix.goarch }}
          path: openpass-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Cache Go build cache
        uses: actions/cache@v5
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: ${{ runner.os }}-go-

      - name: Install dependencies
        run: |
          go mod download

      - name: Install GPG (for encryption tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2

      - name: Run integration tests
        run: |
          # Run tests with longer timeout for integration tests
          go test -v -timeout=10m ./... -run Integration 2>&1
        env:
          CI: true

  smoke-test:
    name: Binary Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v8
        with:
          name: openpass-linux-amd64
          path: ./bin

      - name: Make binary executable
        run: chmod +x ./bin/openpass-linux-amd64

      - name: Smoke test - help flag
        run: ./bin/openpass-linux-amd64 --help

      - name: Smoke test - subcommand help pages
        run: |
          ./bin/openpass-linux-amd64 get --help
          ./bin/openpass-linux-amd64 set --help
          ./bin/openpass-linux-amd64 list --help
          ./bin/openpass-linux-amd64 serve --help

      - name: Smoke test - vault operations
        run: |
          BIN="./bin/openpass-linux-amd64"
          VAULT_DIR=$(mktemp -d)
          PASSPHRASE="test-passphrase-123"
          
          echo "Testing vault initialization..."
          echo "$PASSPHRASE" | $BIN init "$VAULT_DIR"
          
          echo "Testing entry creation..."
          OPENPASS_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" set "test.entry" --value "test-value-456"
          
          echo "Testing entry retrieval..."
          OUTPUT=$(OPENPASS_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" get "test.entry")
          if [ "$OUTPUT" != "test-value-456" ]; then
            echo "ERROR: Expected 'test-value-456', got '$OUTPUT'"
            exit 1
          fi
          echo "Entry retrieval successful"
          
          echo "Testing list command..."
          LIST_OUTPUT=$(OPENPASS_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" list)
          if ! echo "$LIST_OUTPUT" | grep -q "test"; then
            echo "ERROR: List output does not contain 'test'"
            exit 1
          fi
          echo "List command successful"
          
          echo "Testing find command..."
          FIND_OUTPUT=$(OPENPASS_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" find "test-value")
          if ! echo "$FIND_OUTPUT" | grep -q "test"; then
            echo "ERROR: Find output does not contain 'test'"
            exit 1
          fi
          echo "Find command successful"
          
          echo "Cleaning up test vault..."
          rm -rf "$VAULT_DIR"
          
          echo "All smoke tests passed!"
