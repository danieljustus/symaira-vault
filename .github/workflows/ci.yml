name: CI

on:
  push:
    branches: [ main ]
    tags-ignore:
      - 'v*'
  pull_request:
    branches: [ main ]
  schedule:
    - cron: '0 6 * * 1'

permissions:
  contents: read
  security-events: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  GOSEC_VERSION: v2.22.0

jobs:
  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run govulncheck
        uses: golang/govulncheck-action@b625fbe08f3bccbe446d94fbf87fcc875a4f50ee # v1
        with:
          go-version-input: '1.26.4'
          go-package: ./...

  dependency-scan:
    name: Dependency Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run OSV Scanner
        uses: google/osv-scanner-action/osv-scanner-action@9a498708959aeaef5ef730655706c5a1df1edbc2 # v2.3.8
        with:
          scan-args: >-
            --lockfile=go.mod
            --format=sarif
            --output=osv-results.sarif

      - name: Upload OSV SARIF to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: osv-results.sarif

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Check formatting
        run: make fmt-check

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9
        with:
          version: v2.11.4
          install-mode: binary
          args: --timeout=5m --verbose

      - name: Run gosec SAST scanner
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@${{ env.GOSEC_VERSION }}
          gosec -exclude-generated -exclude-dir=testdata -fmt sarif -out gosec.sarif ./...

      - name: Upload gosec SARIF report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: gosec-sarif
          path: gosec.sarif
          retention-days: 7

      - name: Upload gosec results to code scanning
        if: always() && github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@8aad20d150bbac5944a9f9d289da16a4b0d87c1e # v4
        with:
          sarif_file: gosec.sarif

  test:
    name: Test
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go-version: ['1.26.4']
      fail-fast: false
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: ${{ matrix.go-version }}
          cache: true

      - name: Install dependencies
        run: |
          go mod download

      - name: Run tests
        shell: bash
        env:
          CGO_ENABLED: ${{ matrix.os == 'ubuntu-latest' && '1' || '0' }}
        run: |
          if [ "${{ matrix.os }}" == "ubuntu-latest" ]; then
            go test -v -race -timeout=30m -coverprofile=coverage.out -skip 'TestFlow|TestBinaryE2E|Integration' ./...
          else
            go test -v -timeout=30m -skip 'TestFlow|TestBinaryE2E|Integration' ./...
          fi


      - name: Check coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: |
          echo "=== Total coverage check ==="
          COVERAGE_THRESHOLD=63.5
          echo "Threshold: ${COVERAGE_THRESHOLD}%"
          TOTAL_LINE=$(go tool cover -func=coverage.out | grep "total:")
          echo "Coverage line: $TOTAL_LINE"
          COVERAGE=$(echo "$TOTAL_LINE" | grep -oE '[0-9]+\.[0-9]+' | tail -1)
          echo "Total coverage: ${COVERAGE}%"
          if awk "BEGIN {exit !($COVERAGE < $COVERAGE_THRESHOLD)}"; then
            echo "FAIL: Total coverage ${COVERAGE}% is below threshold of ${COVERAGE_THRESHOLD}%"
            exit 1
          fi
          echo "PASS: Total coverage ${COVERAGE}% meets threshold of ${COVERAGE_THRESHOLD}%"

          echo ""
          echo "=== Per-package coverage checks for security-critical packages ==="
          # Includes the network-facing MCP auth surface (token/OAuth/registry/rate-limit),
          # the only remotely reachable code, alongside the local crypto/session/vault core.
          PKG_COV_TMP=$(mktemp -d)
          for PACKAGE in "./internal/crypto/..." \
                         "./internal/session/..." \
                         "./internal/vault/..." \
                         "./internal/mcp/auth/..." \
                         "./internal/mcp/serverbootstrap/..."; do
            # Derive a stable name from the package path. Note: plain
            # `basename "./internal/crypto/..."` returns "..." (the glob segment),
            # so strip the trailing "/..." before taking the basename.
            PKG_NAME=$(basename "${PACKAGE%/...}")
            PKG_PROFILE="$PKG_COV_TMP/${PKG_NAME}.out"
            go test -coverprofile="$PKG_PROFILE" -covermode=atomic -count=1 -timeout=10m \
              -skip 'TestFlow|TestBinaryE2E|Integration' "$PACKAGE"
            # Aggregate across the whole package tree. `go test ... | grep coverage: | tail -1`
            # would report an arbitrary subpackage (e.g. internal/vault/taint) instead of the
            # combined total, so read the total from the merged profile instead.
            PKG_COV=$(go tool cover -func="$PKG_PROFILE" | grep '^total:' | grep -oE '[0-9]+\.[0-9]+' | tail -1)
            [ -z "$PKG_COV" ] && PKG_COV=0
            # Thresholds sit a few points below current measured coverage so the gate
            # guards against regression without flaking on minor line-count drift.
            # Phased target: raise toward 85.0 in follow-up PRs.
            case "$PKG_NAME" in
              crypto)          PKG_THRESHOLD=85.0 ;;
              session)         PKG_THRESHOLD=70.0 ;;
              vault)           PKG_THRESHOLD=72.0 ;;
              auth)            PKG_THRESHOLD=82.0 ;;
              serverbootstrap) PKG_THRESHOLD=78.0 ;;
              *)               PKG_THRESHOLD=65.0 ;;
            esac
            echo "${PKG_NAME}: ${PKG_COV}% (threshold: ${PKG_THRESHOLD}%)"
            if awk "BEGIN {exit !($PKG_COV < $PKG_THRESHOLD)}"; then
              echo "FAIL: ${PKG_NAME} coverage ${PKG_COV}% is below threshold of ${PKG_THRESHOLD}%"
              exit 1
            fi
            echo "PASS: ${PKG_NAME} coverage ${PKG_COV}% meets threshold of ${PKG_THRESHOLD}%"
          done
          rm -rf "$PKG_COV_TMP"

      - name: Run smoke tests
        shell: bash
        run: go test -v -timeout=15m -tags smoke -run TestBetaSmoke .

      - name: Generate coverage report
        if: matrix.os == 'ubuntu-latest'
        run: go tool cover -html=coverage.out -o coverage.html

      - name: Upload coverage artifact
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: coverage-report
          path: coverage.html
          retention-days: 7

  fuzz:
    name: Fuzz Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Run fuzz tests
        run: |
          echo "Running fuzz tests with 60s per target..."
          go test -fuzz=FuzzCSVImporterParse -fuzztime=60s -timeout=180s ./internal/importer/
          go test -fuzz=FuzzBitwardenImporterParse -fuzztime=60s -timeout=180s ./internal/importer/
          go test -fuzz=FuzzOnePUXImporterParse -fuzztime=60s -timeout=180s ./internal/importer/
          go test -fuzz=FuzzParsePassEntry -fuzztime=60s -timeout=180s ./internal/importer/
          go test -fuzz=FuzzNormalizePath -fuzztime=60s -timeout=180s ./internal/importer/
          go test -fuzz=FuzzParseMapping -fuzztime=60s -timeout=180s ./internal/importer/
          echo "All fuzz tests passed without crashes"

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, test, govulncheck, dependency-scan]
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
            extension: .exe
          - goos: windows
            goarch: arm64
            extension: .exe
          - goos: freebsd
            goarch: amd64
          - goos: freebsd
            goarch: arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          output_name="symvault-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}"
          go build -ldflags="-s -w -X main.version=dev -X main.commit=${{ github.sha }}" -o "$output_name" .
          echo "Built: $output_name"

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: symvault-${{ matrix.goos }}-${{ matrix.goarch }}
          path: symvault-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.extension }}
          retention-days: 7

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.4'
          cache: true

      - name: Install dependencies
        run: |
          go mod download

      - name: Install GPG (for encryption tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y gnupg2

      - name: Run integration tests
        run: |
          # Run tests with longer timeout for integration tests
          go test -v -timeout=10m ./... -run Integration 2>&1
        env:
          CI: true

  smoke-test:
    name: Binary Smoke Test
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Download linux-amd64 binary
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: symvault-linux-amd64
          path: ./bin

      - name: Make binary executable
        run: chmod +x ./bin/symvault-linux-amd64

      - name: Smoke test - help flag
        run: ./bin/symvault-linux-amd64 --help

      - name: Smoke test - subcommand help pages
        run: |
          ./bin/symvault-linux-amd64 get --help
          ./bin/symvault-linux-amd64 set --help
          ./bin/symvault-linux-amd64 list --help
          ./bin/symvault-linux-amd64 serve --help

      - name: Smoke test - vault operations
        run: |
          BIN="./bin/symvault-linux-amd64"
          VAULT_DIR=$(mktemp -d)
          PASSPHRASE="test-passphrase-123"
          
          echo "Testing vault initialization..."
          SYMVAULT_PASSPHRASE="$PASSPHRASE" $BIN init "$VAULT_DIR"
          
          echo "Testing entry creation..."
          SYMVAULT_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" set "test.entry" --value "test-value-456"
          
          echo "Testing entry retrieval..."
          OUTPUT=$(SYMVAULT_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" get "test.entry")
          if [ "$OUTPUT" != "test-value-456" ]; then
            echo "ERROR: Expected 'test-value-456', got '$OUTPUT'"
            exit 1
          fi
          echo "Entry retrieval successful"
          
          echo "Testing list command..."
          LIST_OUTPUT=$(SYMVAULT_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" list)
          if ! echo "$LIST_OUTPUT" | grep -q "test"; then
            echo "ERROR: List output does not contain 'test'"
            exit 1
          fi
          echo "List command successful"
          
          echo "Testing find command..."
          FIND_OUTPUT=$(SYMVAULT_PASSPHRASE="$PASSPHRASE" $BIN --vault "$VAULT_DIR" find "test-value")
          if ! echo "$FIND_OUTPUT" | grep -q "test"; then
            echo "ERROR: Find output does not contain 'test'"
            exit 1
          fi
          echo "Find command successful"
          
          echo "Cleaning up test vault..."
          rm -rf "$VAULT_DIR"
          
          echo "All smoke tests passed!"

  ci-gate:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [govulncheck, dependency-scan, lint, test, fuzz, build, integration-test, smoke-test]
    steps:
      - name: Confirm Success
        run: echo "All checks passed successfully!"
