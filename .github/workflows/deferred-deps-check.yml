name: Deferred Dependencies Check

on:
  schedule:
    - cron: '0 9 1 * *'  # Monthly on the 1st at 09:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: '1.26.3'
          cache: true

      - name: Check for deferred dependency updates
        id: check
        run: |
          # Check ProtonMail/go-crypto version via go-git
          echo "=== Checking ProtonMail/go-crypto via go-git ==="
          go list -m -json github.com/go-git/go-git/v5 | jq -r '.Deps[] | select(.Path == "github.com/ProtonMail/go-crypto") | "\(.Path) \(.Version)"' || true

          # Check if groupcache still uses golang/protobuf
          echo "=== Checking groupcache protobuf dependency ==="
          go list -m -json github.com/golang/groupcache 2>/dev/null | jq -r '.Deps[] | select(.Path == "github.com/golang/protobuf") | "FOUND: \(.Path) \(.Version)"' || echo "groupcache not a direct dependency"

          # Check available updates
          echo "=== Checking available module updates ==="
          go list -m -u all | grep -E "(ProtonMail/go-crypto|golang/protobuf)" || echo "No updates found for deferred deps"

          # Set outputs for issue creation
          PROTON_VERSION=$(go list -m -json github.com/go-git/go-git/v5 2>/dev/null | jq -r '.Deps[]? | select(.Path == "github.com/ProtonMail/go-crypto") | .Version' || echo "unknown")
          echo "proton_version=$PROTON_VERSION" >> "$GITHUB_OUTPUT"

          HAS_GOLANG_PROTOBUF=$(go list -m -json all 2>/dev/null | jq -r 'select(.Path == "github.com/golang/protobuf") | .Version' | head -1 || echo "")
          echo "has_golang_protobuf=$HAS_GOLANG_PROTOBUF" >> "$GITHUB_OUTPUT"

      - name: Create issue if ProtonMail/go-crypto updated
        if: steps.check.outputs.proton_version != '' && !contains(steps.check.outputs.proton_version, 'v1.1.')
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799c7f6 # v9
        with:
          script: |
            const version = '${{ steps.check.outputs.proton_version }}';
            const title = `Deferred dependency updated: ProtonMail/go-crypto ${version}`;
            const body = `The deferred dependency \`github.com/ProtonMail/go-crypto\` has been updated to \`${version}\` via go-git.\n\nThis was previously deferred because it is a transitive dependency through go-git. Please evaluate whether this update can now be applied.\n\n- [ ] Check go-git release notes for ProtonMail/go-crypto compatibility\n- [ ] Run security scan on new version\n- [ ] Update \`go.mod\` if safe to proceed\n- [ ] Update \`docs/dependency-evaluations/protonmail-go-crypto.md\``;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependencies,deferred',
              state: 'open'
            });

            const exists = issues.data.some(i => i.title === title);
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependencies', 'deferred']
              });
            }

      - name: Create issue if golang/protobuf still present
        if: steps.check.outputs.has_golang_protobuf != ''
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799c7f6 # v9
        with:
          script: |
            const version = '${{ steps.check.outputs.has_golang_protobuf }}';
            const title = `Deferred dependency still present: golang/protobuf ${version}`;
            const body = `The deprecated dependency \`github.com/golang/protobuf\` is still present at version \`${version}\`.\n\nThis was previously deferred because it is a transitive dependency through groupcache. Please check if groupcache has migrated to \`google.golang.org/protobuf\`.\n\n- [ ] Check groupcache repository for protobuf migration status\n- [ ] Evaluate if a direct dependency update resolves this\n- [ ] Update \`docs/dependency-evaluations/golang-protobuf-migration.md\``;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'dependencies,deferred',
              state: 'open'
            });

            const exists = issues.data.some(i => i.title === title);
            if (!exists) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['dependencies', 'deferred']
              });
            }
